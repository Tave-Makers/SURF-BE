services:
  tave-surf:
    image: koreaioi/tave-surf:latest
    container_name: tave-surf
    ports:
      - "8080:8080"
    env_file:
      - ./tave-surf.env
    environment:
      - TZ=Asia/Seoul
      - FIREBASE_CONFIG_PATH=/firebase/firebase-adminsdk.json
    networks:
      - tave-surf-net
    volumes:
      - ./logs:/logs
      - ./firebase/firebase-adminsdk.json:/firebase/firebase-adminsdk.json:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: tave_surf
      MYSQL_TCP_PORT: 3306
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - tave-surf-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tave-surf-net
    restart: unless-stopped

networks:
  tave-surf-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
